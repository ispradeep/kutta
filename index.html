<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pradeep Kumar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      max-width: 560px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      line-height: 1.6;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .profile p {
      font-size: 0.95rem;
      color: #888;
      margin-top: 0.2rem;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #bbb;
      margin-bottom: 0.6rem;
    }

    .about p {
      font-size: 0.95rem;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="profile">
    <img src="https://res.cloudinary.com/dpgiybkjb/image/upload/v1767528751/IMG20251206081433_2_vufwgw.jpg" alt="Pradeep Kumar">
    <div>
      <h1>Pradeep Kumar</h1>
      <p>Software Developer</p>
    </div>
  </div>

  <div class="about">
    <div class="section-label">About</div>
    <p>Software developer. I turn coffee into bugs, then fix the bugs. Occasionally it works on the first try — I don't trust those moments.</p>
  </div>

</body>
</html>
